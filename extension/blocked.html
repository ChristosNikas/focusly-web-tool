<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="tailwind.css">
</head>
<body class="bg-black text-gray-100 font-sans h-screen flex items-center justify-center">

    <div class="text-center max-w-md p-8">

        <h1 class="text-2xl font-bold text-yellow-600 mb-2">Stay Focused Bro</h1>

        <p class="text-gray-400 mb-4">This site was blocked because it's considered as distracting.</p>   

        <p id="reason" class="text-xs text-gray-500 italic mb-6"></p>

        <!--list of blocked sites-->
        <p id="blockedUrl" class="text-xs text-gray-600 mb-6 break-all"></p>

        <!--BACK btn-->
        <button id="goBackBtn"
            class="bg-yellow-600 hover:bg-yellow-700 text-black font-semibold py-2 px-6 rounded-lg transition">
            Go Back to Work
        </button>
    </div>

    <script src="blocked.js"></script>

</html>
